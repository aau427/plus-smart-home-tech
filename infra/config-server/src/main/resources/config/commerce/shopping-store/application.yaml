spring:
  application:
    name: shopping-store

    serialization:
      write-sort-keys-as-ids-allowed: true

  datasource:
    url: jdbc:postgresql://localhost:5432/sht-db?currentSchema=store
    username: user
    password: user
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      # Всегда выполнять скрипты при старте
      mode: always

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: store

logging:
  level:
    andrey: INFO
    # Логирование SQL-запросов и их параметров
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

server:
  port: 0
